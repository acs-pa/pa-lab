# SPDX-License-Identifier: BSD-3-Clause

name: Greetings

permissions:
  pull-requests: write
  issues: write

on: [pull_request, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: 'Welcome to the dark side, we have cookies!'
        pr-message: 'Welcome to the dark side, we have cookies!'
